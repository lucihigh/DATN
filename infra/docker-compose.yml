version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewallet
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ewallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ..
      dockerfile: apps/ai-service/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT_AI: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ewallet
      MONGODB_DB: ComputerResearchProject
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    ports:
      - "8000:8000"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT_API: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ewallet
      AI_SERVICE_URL: http://ai-service:8000
      AUTO_START_LOCAL_AI_SERVICE: 0
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT_WEB: 5173
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  db-data:
